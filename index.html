<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Track OS</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --bg-color: #F2F2F7;
            --card-bg: #FFFFFF;
            --text-main: #1C1C1E;
            --text-muted: #8E8E93;
            --accent: #007AFF;
            --success: #34C759;
            --danger: #FF3B30;
            --border: #E5E5EA;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .view {
            display: none;
            flex-direction: column;
            height: calc(100vh - 75px);
            width: 100%;
        }

        .view.active { display: flex; }

        /* Dashboard */
        #dashboard {
            background-color: var(--card-bg);
            padding: 20px 15px;
            padding-top: 45px;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.02);
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            z-index: 10;
        }

        .metric { text-align: center; }
        .metric-value { font-size: 22px; font-weight: 700; display: block; letter-spacing: -0.5px; }
        .metric-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; margin-top: 6px; display: flex; align-items: center; justify-content: center; gap: 4px; }
        .metric-label i { width: 12px; height: 12px; }

        #map { flex-grow: 1; width: 100%; z-index: 1; }

        /* Controls / Buttons */
        #controls {
            position: absolute;
            bottom: 95px;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            z-index: 20;
            pointer-events: none;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            pointer-events: auto;
        }

        .btn {
            pointer-events: auto;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.15s, background-color 0.2s;
        }
        .btn:active { transform: scale(0.96); }

        .btn-primary { background-color: var(--accent); color: white; padding: 16px 36px; box-shadow: 0 8px 25px rgba(0, 122, 255, 0.25); }
        .btn-success { background-color: var(--success); color: white; padding: 16px 30px; box-shadow: 0 8px 25px rgba(52, 199, 89, 0.25); }
        .btn-danger { background-color: var(--danger); color: white; padding: 16px 30px; box-shadow: 0 8px 25px rgba(255, 59, 48, 0.25); }
        
        #pocketBtn {
            background-color: #1C1C1E;
            color: white;
            padding: 10px 20px;
            font-size: 13px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            display: none;
        }

        /* Pocket Mode Overlay */
        #pocketOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000000;
            z-index: 9999;
            color: #333;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
        }
        #pocketOverlay p { font-size: 14px; color: #444; margin-top: 20px; line-height: 1.4; }

        /* Summary Modal Screen */
        #summaryModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--bg-color);
            z-index: 5000;
            flex-direction: column;
            padding: 24px;
            padding-top: 50px;
            overflow-y: auto;
        }

        #summaryMap {
            width: 100%;
            height: 200px;
            border-radius: 20px;
            margin: 20px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 30px;
        }

        .summary-card {
            background: var(--card-bg);
            padding: 16px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .summary-card .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 4px;}
        .summary-card .label i { width: 12px; height: 12px; }
        .summary-card .val { font-size: 20px; font-weight: 700; }

        /* Historie */
        #historyView { padding: 20px; padding-top: 45px; overflow-y: auto; }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 16px; letter-spacing: -0.5px; }
        
        .stats-summary { 
            background: var(--card-bg); 
            padding: 16px; 
            border-radius: 20px; 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
            margin-bottom: 24px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.01); 
        }

        .history-section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 10px;
            padding-left: 4px;
        }

        .workout-card { 
            background: var(--card-bg); 
            padding: 16px; 
            border-radius: 18px; 
            margin-bottom: 12px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.01); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .workout-info .date { font-size: 12px; color: var(--text-muted); font-weight: 500; margin-bottom: 6px; }
        .workout-info .main-stats { font-size: 18px; font-weight: 700; color: var(--text-main); margin-bottom: 4px; }
        .workout-info .sub-stats { font-size: 13px; color: var(--text-muted); display: flex; gap: 10px; align-items: center; }
        .workout-info .sub-stats span { display: flex; align-items: center; gap: 3px; }
        .workout-info .sub-stats i { width: 12px; height: 12px; }
        
        .share-btn { background: var(--bg-color); border: none; padding: 10px 14px; border-radius: 12px; font-size: 13px; font-weight: 600; color: var(--accent); cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .share-btn i { width: 14px; height: 14px; }
        .no-workouts { text-align: center; color: var(--text-muted); margin-top: 60px; font-size: 15px; }

        /* Tab Bar */
        #tabBar { height: 75px; background-color: var(--card-bg); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; position: fixed; bottom: 0; left: 0; width: 100%; z-index: 30; padding-bottom: 15px; }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 11px; font-weight: 600; text-decoration: none; cursor: pointer; background: none; border: none; width: 50%; gap: 4px; }
        .tab-item i { width: 20px; height: 20px; }
        .tab-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <div id="pocketOverlay">
        <i data-lucide="lock" style="width: 48px; height: 48px; color: #222;"></i>
        <p>Taschenmodus aktiv.<br>Doppelt tippen zum Aufwachen.</p>
    </div>

    <div id="summaryModal">
        <h1 style="text-align: center;">Workout Zusammenfassung</h1>
        <div id="summaryMap"></div>
        
        <div class="summary-grid">
            <div class="summary-card">
                <span class="label"><i data-lucide="milestone"></i>Distanz</span>
                <span class="val" id="sumDist">0.00 km</span>
            </div>
            <div class="summary-card">
                <span class="label"><i data-lucide="timer"></i>Dauer</span>
                <span class="val" id="sumTime">00:00</span>
            </div>
            <div class="summary-card">
                <span class="label"><i data-lucide="gauge"></i>Ø Pace</span>
                <span class="val" id="sumPace">0:00 min/km</span>
            </div>
            <div class="summary-card">
                <span class="label"><i data-lucide="trending-up"></i>Höhenmeter</span>
                <span class="val" id="sumElevation">0m</span>
            </div>
        </div>

        <button class="btn btn-primary" style="width: 100%; padding: 18px;" onclick="closeSummary()">Workout schließen</button>
    </div>

    <div id="trackView" class="view active">
        <div id="dashboard">
            <div class="metric">
                <span class="metric-value" id="timeDisplay">00:00</span>
                <span class="metric-label"><i data-lucide="timer"></i>Zeit</span>
            </div>
            <div class="metric">
                <span class="metric-value" id="distDisplay">0.00</span>
                <span class="metric-label"><i data-lucide="milestone"></i>Distanz</span>
            </div>
            <div class="metric">
                <span class="metric-value" id="paceDisplay">--:--</span>
                <span class="metric-label"><i data-lucide="gauge"></i>Pace</span>
            </div>
            <div class="metric">
                <span class="metric-value" id="elevationDisplay">0m</span>
                <span class="metric-label"><i data-lucide="trending-up"></i>Gain</span>
            </div>
        </div>

        <div id="map"></div>

        <div id="controls">
            <button id="pocketBtn" class="btn"><i data-lucide="eye-off"></i>Taschenmodus</button>
            
            <div id="btnGroup">
                <button id="startBtn" class="btn btn-primary" onclick="handleStart()"><i data-lucide="play"></i>Start</button>
            </div>
        </div>
    </div>

    <div id="historyView" class="view">
        <h1>Aktivitäten</h1>
        <div class="stats-summary">
            <div class="metric"><span class="metric-value" id="totalKmAllTime">0.0</span><span class="metric-label">Gesamt KM</span></div>
            <div class="metric"><span class="metric-value" id="totalCountAllTime">0</span><span class="metric-label">Workouts</span></div>
            <div class="metric"><span class="metric-value" id="totalElevAllTime">0m</span><span class="metric-label">Höhenmeter</span></div>
        </div>
        
        <div class="history-section-title">Letzte Aktivitäten</div>
        <div id="historyList"></div>
    </div>

    <nav id="tabBar">
        <button class="tab-item active" onclick="switchView('trackView')"><i data-lucide="navigation"></i><span>Tracker</span></button>
        <button class="tab-item" onclick="switchView('historyView')"><i data-lucide="activity"></i><span>Historie</span></button>
    </nav>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Tracking Status: 'stopped', 'tracking', 'paused'
        let trackingStatus = 'stopped'; 
        let watchId = null;
        let timerInterval = null;
        let wakeLock = null;
        
        let totalSeconds = 0;
        let totalDistanceKm = 0;
        let totalElevationGain = 0;
        let lastAltitude = null;
        
        let positions = [];
        let polyline = null;
        let map = null;
        let summaryMap = null;
        let summaryPolyline = null;
        let marker = null;

        const timeDisplay = document.getElementById('timeDisplay');
        const distDisplay = document.getElementById('distDisplay');
        const paceDisplay = document.getElementById('paceDisplay');
        const elevationDisplay = document.getElementById('elevationDisplay');
        
        const pocketBtn = document.getElementById('pocketBtn');
        const pocketOverlay = document.getElementById('pocketOverlay');
        const btnGroup = document.getElementById('btnGroup');
        const summaryModal = document.getElementById('summaryModal');

        function initApp() {
            map = L.map('map', { zoomControl: false }).setView([53.5511, 9.9937], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);
            polyline = L.polyline([], {color: '#007AFF', weight: 5, opacity: 0.85, smoothFactor: 1}).addTo(map);
            lucide.createIcons();
            checkAndRequestLocationPermission();
        }

        function switchView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            event.currentTarget.classList.add('active');
            if(viewId === 'historyView') { renderHistory(); }
            else if (viewId === 'trackView' && map) { setTimeout(() => map.invalidateSize(), 100); }
        }

        async function requestWakeLock() {
            try { if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); } } 
            catch (err) {}
        }
        function releaseWakeLock() { if (wakeLock !== null) { wakeLock.release(); wakeLock = null; } }

        function checkAndRequestLocationPermission() {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition((position) => {
                const loc = L.latLng(position.coords.latitude, position.coords.longitude);
                map.setView(loc, 15);
                if (!marker) { marker = L.circleMarker(loc, { radius: 6, fillColor: "#007AFF", color: "#FFFFFF", weight: 3, opacity: 1, fillOpacity: 1 }).addTo(map); }
            }, () => {}, { enableHighAccuracy: true });
        }

        // --- Steuerungs-Logik ---
        function handleStart() {
            trackingStatus = 'tracking';
            updateControlButtons();
            pocketBtn.style.display = "flex";
            
            requestWakeLock();
            timerInterval = setInterval(() => {
                totalSeconds++;
                updateDashboard();
            }, 1000);

            startGPSWatching();
        }

        function handlePause() {
            trackingStatus = 'paused';
            updateControlButtons();
            clearInterval(timerInterval);
            if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
            releaseWakeLock();
        }

        function handleResume() {
            trackingStatus = 'tracking';
            updateControlButtons();
            requestWakeLock();
            timerInterval = setInterval(() => {
                totalSeconds++;
                updateDashboard();
            }, 1000);
            startGPSWatching();
        }

        function handleStop() {
            clearInterval(timerInterval);
            if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
            releaseWakeLock();
            
            pocketBtn.style.display = "none";

            if (totalDistanceKm > 0.01) {
                saveWorkout(totalDistanceKm, totalSeconds, Math.round(totalElevationGain));
                openSummary();
            } else {
                alert("Workout war zu kurz zum Speichern.");
                resetTrackerUI();
            }
            trackingStatus = 'stopped';
            updateControlButtons();
        }

        function startGPSWatching() {
            watchId = navigator.geolocation.watchPosition(
                (position) => {
                    if (trackingStatus !== 'tracking') return;
                    const lat = position.coords.latitude; const lon = position.coords.longitude; const alt = position.coords.altitude;
                    const newPoint = L.latLng(lat, lon);

                    if (positions.length > 0) {
                        const lastPoint = positions[positions.length - 1];
                        const dist = getDistanceFromLatLonInKm(lastPoint.lat, lastPoint.lng, lat, lon);
                        if (position.coords.accuracy < 30 && dist > 0.002) {
                            totalDistanceKm += dist;
                            if (alt !== null && lastAltitude !== null) {
                                const eleDiff = alt - lastAltitude;
                                if (eleDiff > 1) totalElevationGain += eleDiff;
                            }
                        }
                    }
                    if (alt !== null) lastAltitude = alt;
                    positions.push(newPoint); 
                    polyline.setLatLngs(positions);
                    map.setView(newPoint, 16);
                    if (!marker) { marker = L.circleMarker(newPoint, { radius: 6, fillColor: "#007AFF", color: "#FFFFFF", weight: 3, opacity: 1, fillOpacity: 1 }).addTo(map); } 
                    else { marker.setLatLng(newPoint); }
                    updateDashboard();
                }, () => {}, { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
            );
        }

        function updateControlButtons() {
            if (trackingStatus === 'tracking') {
                btnGroup.innerHTML = `<button class="btn btn-danger" onclick="handlePause()"><i data-lucide="pause"></i>Pause</button>`;
            } else if (trackingStatus === 'paused') {
                btnGroup.innerHTML = `
                    <button class="btn btn-success" onclick="handleResume()"><i data-lucide="play"></i>Weiter</button>
                    <button class="btn btn-danger" style="background-color:#8E8E93;" onclick="handleStop()"><i data-lucide="square"></i>Beenden</button>
                `;
            } else if (trackingStatus === 'stopped') {
                btnGroup.innerHTML = `<button id="startBtn" class="btn btn-primary" onclick="handleStart()"><i data-lucide="play"></i>Start</button>`;
            }
            lucide.createIcons();
        }

        function resetTrackerUI() {
            totalSeconds = 0; totalDistanceKm = 0; totalElevationGain = 0; lastAltitude = null; positions = [];
            polyline.setLatLngs([]);
            if(marker) { map.removeLayer(marker); marker = null; }
            updateDashboard();
            checkAndRequestLocationPermission();
        }

        function updateDashboard() {
            timeDisplay.textContent = formatTime(totalSeconds);
            distDisplay.textContent = totalDistanceKm.toFixed(2);
            elevationDisplay.textContent = `${Math.round(totalElevationGain)}m`;
            paceDisplay.textContent = totalDistanceKm > 0.02 ? calculatePace(totalSeconds, totalDistanceKm) : "--:--";
        }

        // --- Summary Screen Logik ---
        function openSummary() {
            document.getElementById('sumDist').textContent = `${totalDistanceKm.toFixed(2)} km`;
            document.getElementById('sumTime').textContent = formatTime(totalSeconds);
            document.getElementById('sumPace').textContent = `${calculatePace(totalSeconds, totalDistanceKm)} min/km`;
            document.getElementById('sumElevation').textContent = `${Math.round(totalElevationGain)}m`;
            
            summaryModal.style.display = 'flex';
            
            // Render Map im Summary Screen
            setTimeout(() => {
                if (!summaryMap) {
                    summaryMap = L.map('summaryMap', { zoomControl: false });
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(summaryMap);
                    summaryPolyline = L.polyline([], {color: '#007AFF', weight: 5, opacity: 0.85}).addTo(summaryMap);
                }
                
                if (positions.length > 0) {
                    summaryPolyline.setLatLngs(positions);
                    summaryMap.fitBounds(summaryPolyline.getBounds(), { padding: [20, 20] });
                }
            }, 200);
        }

        function closeSummary() {
            summaryModal.style.display = 'none';
            resetTrackerUI();
        }

        // --- Helpers ---
        function formatTime(seconds) {
            const hrs = Math.floor(seconds / 3600); const mins = Math.floor((seconds % 3600) / 60); const secs = seconds % 60;
            return hrs > 0 ? `${hrs}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}` : `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function calculatePace(seconds, distanceKm) {
            const paceInMinutes = (seconds / 60) / distanceKm;
            const paceMins = Math.floor(paceInMinutes); const paceSecs = Math.floor((paceInMinutes - paceMins) * 60);
            return `${paceMins}:${paceSecs.toString().padStart(2, '0')}`;
        }

        function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
            const R = 6371; const dLat = (lat2-lat1) * (Math.PI/180); const dLon = (lon2-lon1) * (Math.PI/180); 
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * (Math.PI/180)) * Math.cos(lat2 * (Math.PI/180)) * Math.sin(dLon/2) * Math.sin(dLon/2); 
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        // --- Speicher & Historie ---
        function saveWorkout(km, seconds, elevation) {
            const workouts = JSON.parse(localStorage.getItem('workouts') || '[]');
            workouts.unshift({ id: Date.now(), date: new Date().toLocaleDateString('de-DE', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' }), km: km, seconds: seconds, elevation: elevation, pace: calculatePace(seconds, km) });
            localStorage.setItem('workouts', JSON.stringify(workouts));
        }

        function renderHistory() {
            const workouts = JSON.parse(localStorage.getItem('workouts') || '[]');
            const listContainer = document.getElementById('historyList');
            const totalKm = workouts.reduce((sum, w) => sum + w.km, 0);
            const totalElev = workouts.reduce((sum, w) => sum + (w.elevation || 0), 0);
            
            document.getElementById('totalKmAllTime').textContent = totalKm.toFixed(1);
            document.getElementById('totalCountAllTime').textContent = workouts.length;
            document.getElementById('totalElevAllTime').textContent = `${totalElev}m`;

            if (workouts.length === 0) { listContainer.innerHTML = '<div class="no-workouts">Noch keine Aktivitäten aufgezeichnet.</div>'; return; }
            
            listContainer.innerHTML = workouts.map(w => `
                <div class="workout-card">
                    <div class="workout-info">
                        <div class="date">${w.date}</div>
                        <div class="main-stats">${w.km.toFixed(2)} km</div>
                        <div class="sub-stats">
                            <span><i data-lucide="timer"></i>${formatTime(w.seconds)}</span>
                            <span><i data-lucide="gauge"></i>${w.pace} /km</span>
                            ${w.elevation > 0 ? `<span><i data-lucide="trending-up"></i>${w.elevation}m</span>` : ''}
                        </div>
                    </div>
                    <button class="share-btn" onclick="shareWorkout('${w.date}', ${w.km}, '${w.pace}', ${w.seconds}, ${w.elevation || 0})"><i data-lucide="share-2"></i>Teilen</button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function shareWorkout(date, km, pace, seconds, elevation) {
            let shareText = `🚴‍♂️ Workout geschafft!\n\n📅 Datum: ${date}\n📏 Distanz: ${km.toFixed(2)} km\n⏱️ Zeit: ${formatTime(seconds)}\n⚡ Pace: ${pace} min/km\n\nTracked mit Track OS.`;
            if (navigator.share) { try { await navigator.share({ title: 'Mein Workout', text: shareText }); } catch (err) {} } 
            else { navigator.clipboard.writeText(shareText); alert('Kopiert! 📋'); }
        }

        pocketBtn.addEventListener('click', () => { pocketOverlay.style.display = 'flex'; });
        pocketOverlay.addEventListener('dblclick', () => { pocketOverlay.style.display = 'none'; });

        initApp();
    </script>
</body>
</html>
